<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login - LuxeStore</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="assets/css/style.css">
</head>
<body class="light-mode login-page">
    <div id="loading" class="loading-overlay">
        <div class="spinner"></div>
    </div>

    <div class="login-card glass-panel scroll-anim animated">
        <a href="index.html" class="logo">
            <i class="fa-solid fa-gem"></i> <span>LuxeStore</span>
        </a>
        <h2>Admin Portal</h2>
        <p class="subtitle">Enter your administrator credentials to access the management control center.</p>

        <form id="login-form">
            <div class="form-group">
                <label>Username</label>
                <input type="text" id="username" placeholder="admin" required autocomplete="username">
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" id="password" placeholder="••••••••" required autocomplete="current-password">
            </div>
            <button type="submit" class="btn btn-primary btn-block btn-large" style="margin-top: 24px;">
                <i class="fa-solid fa-right-to-bracket"></i> Secure Sign In
            </button>
        </form>
        <p class="text-center text-muted" style="font-size: 0.82rem; margin-top: 24px;">
            <a href="index.html"><i class="fa-solid fa-arrow-left-long"></i> Return to Front Store</a>
        </p>
    </div>

    <div class="toast-container" id="toast-container"></div>

    <script src="assets/js/db.js"></script>
    <script src="assets/js/main.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            // Check if already authenticated
            if (localStorage.getItem('luxe_admin_auth') === 'true') {
                window.location.href = 'admin.html';
                return;
            }

            document.getElementById('login-form').addEventListener('submit', (e) => {
                e.preventDefault();
                const u = document.getElementById('username').value.trim();
                const p = document.getElementById('password').value.trim();

                if (u === 'admin' && p === 'admin123') {
                    localStorage.setItem('luxe_admin_auth', 'true');
                    showToast('Authentication successful! Opening dashboard...', 'success');
                    setTimeout(() => {
                        window.location.href = 'admin.html';
                    }, 1000);
                } else {
                    showToast('Invalid administrator username or password.', 'error');
                }
            });
        });
    </script>
</body>
</html>
